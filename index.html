<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacidade e Cookies</title>
    <style>
        /* Estilos de Reset e Base */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
        }

        /* Container Principal do Banner */
        #cookie-notice {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 500px;
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            z-index: 10000;
            border: 1px solid #eaeaea;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* Título e Ícone */
        .cookie-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .cookie-header h2 {
            font-size: 18px;
            margin: 0;
            color: #1a1a1a;
            font-weight: 700;
        }

        /* Texto */
        .cookie-body p {
            font-size: 14px;
            line-height: 1.6;
            color: #4b5563;
            margin: 0 0 20px 0;
        }

        .cookie-body a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        /* Grupo de Botões */
        .cookie-footer {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            flex: 1;
            min-width: 140px;
        }

        .btn-primary {
            background-color: #1a1a1a;
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: #333333;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background-color: #e5e7eb;
        }

        .btn-link {
            background: none;
            color: #9ca3af;
            font-size: 13px;
            text-decoration: underline;
            flex: none;
            min-width: auto;
        }

        .btn-link:hover {
            color: #4b5563;
        }

        /* Responsividade para Telas Pequenas */
        @media (max-width: 400px) {
            .cookie-footer { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="cookie-notice">
        <div class="cookie-header">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            <h2>Uso de cookies</h2>
        </div>
        <div class="cookie-body">
            <p>
                Utilizamos cookies essenciais para personalizar conteúdos e melhorar a sua experiência. Ao continuar, você concorda com nossa política de dados. <a href="#">Saiba mais</a>
            </p>
        </div>
        <div class="cookie-footer">
            <button class="btn btn-primary" onclick="irParaPagina()">Aceitar todos</button>
            <button class="btn btn-secondary" onclick="irParaPagina()">Configurações</button>
            <button class="btn btn-link" onclick="irParaPagina()">Não, obrigado</button>
        </div>
    </div>

    <script>
        function irParaPagina() {
            // O novo link que você passou
            const URL_DESTINO = "https://projetoselecionado2026abril.netlify.app/";
            
            // Redireciona o usuário
            window.location.href = URL_DESTINO;
        }
    </script>

</body>
</html>
